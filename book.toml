[book]
title = "The Architecture of Intent"
description = "Designing Agency in an Age Where Code Is No Longer Scarce"
authors = ["Marcel Aldecoa"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = ""
edit-url-template = ""
site-url = "/"
mathjax-support = true
additional-css = ["theme/custom.css"]
additional-js = ["theme/zoom.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[preprocessor.index]
[preprocessor.links]
