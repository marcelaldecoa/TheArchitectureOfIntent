<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720"
     font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrJM" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6366F1"/>
    </marker>
  </defs>

  <rect width="1400" height="720" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#0F1729">Where senior judgment used to land, and where it lands now</text>
  <text x="700" y="80" text-anchor="middle" font-size="14" font-style="italic" fill="#64748B">The judgment doesn't disappear. It moves upstream — from during implementation to during specification.</text>

  <!-- Lifecycle timeline backbone -->
  <line x1="100" y1="290" x2="1300" y2="290" stroke="#94A3B8" stroke-width="2"/>
  <text x="100" y="270" font-size="11" font-weight="700" fill="#64748B" letter-spacing="1.4">INTENT</text>
  <text x="445" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B" letter-spacing="1.4">SPECIFICATION</text>
  <text x="790" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B" letter-spacing="1.4">IMPLEMENTATION</text>
  <text x="1135" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B" letter-spacing="1.4">VALIDATION</text>
  <text x="1300" y="270" text-anchor="end" font-size="11" font-weight="700" fill="#64748B" letter-spacing="1.4">TIME →</text>

  <!-- Phase markers on the timeline -->
  <circle cx="100" cy="290" r="6" fill="#0F1729"/>
  <circle cx="445" cy="290" r="6" fill="#0F1729"/>
  <circle cx="790" cy="290" r="6" fill="#0F1729"/>
  <circle cx="1135" cy="290" r="6" fill="#0F1729"/>
  <circle cx="1300" cy="290" r="6" fill="#0F1729"/>

  <!-- =================== Pre-agent era (above timeline) =================== -->
  <text x="100" y="135" font-size="12" font-weight="700" fill="#92400E" letter-spacing="1.6">PRE-AGENT ERA</text>

  <!-- judgment band: thick block over Implementation -->
  <rect x="650" y="160" width="280" height="100" rx="10" fill="#FEF3C7" stroke="#B45309" stroke-width="1.4"/>
  <text x="790" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E" letter-spacing="1.2">JUDGMENT LANDED HERE</text>
  <text x="790" y="216" text-anchor="middle" font-size="13" fill="#0F1729">Late, during implementation:</text>
  <text x="790" y="234" text-anchor="middle" font-size="12" fill="#475569">fill gaps from experience · escalate ambiguity</text>
  <text x="790" y="250" text-anchor="middle" font-size="12" fill="#475569">rewrite tickets · spot the bug that matters</text>

  <line x1="650" y1="263" x2="790" y2="284" stroke="#B45309" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="930" y1="263" x2="790" y2="284" stroke="#B45309" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- Thin band over Spec — pre-agent spec was thin -->
  <rect x="380" y="200" width="130" height="40" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="445" y="223" text-anchor="middle" font-size="11" fill="#64748B">Thin spec, OK</text>

  <!-- =================== Agent era (below timeline) =================== -->
  <text x="100" y="370" font-size="12" font-weight="700" fill="#3730A3" letter-spacing="1.6">AGENT ERA</text>

  <!-- judgment band: thick block over Specification -->
  <rect x="305" y="395" width="280" height="100" rx="10" fill="#EEF2FF" stroke="#3730A3" stroke-width="1.6"/>
  <text x="445" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#3730A3" letter-spacing="1.2">JUDGMENT LANDS HERE</text>
  <text x="445" y="450" text-anchor="middle" font-size="13" fill="#0F1729">Upstream, in the spec:</text>
  <text x="445" y="468" text-anchor="middle" font-size="12" fill="#475569">name constraints · forbid actions explicitly</text>
  <text x="445" y="484" text-anchor="middle" font-size="12" fill="#475569">declare archetype · calibrate the four dials</text>

  <line x1="305" y1="395" x2="445" y2="296" stroke="#3730A3" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="585" y1="395" x2="445" y2="296" stroke="#3730A3" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- Thin band over Implementation — now agent executes the spec -->
  <rect x="725" y="395" width="130" height="40" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="790" y="418" text-anchor="middle" font-size="11" fill="#64748B">Agent executes</text>

  <!-- The migration arrow — curves leftward across the timeline -->
  <path d="M 790 263 C 730 320, 530 360, 445 393"
        fill="none" stroke="#6366F1" stroke-width="2.2" stroke-dasharray="6,4" opacity="0.8"
        marker-end="url(#arrJM)"/>
  <!-- Label sits along the arc, not at the top -->
  <rect x="540" y="325" width="280" height="34" rx="6" fill="#FAFAF7" stroke="#6366F1" stroke-width="1" opacity="0.95"/>
  <text x="680" y="347" text-anchor="middle" font-size="13" font-weight="700" fill="#6366F1" letter-spacing="1.4">JUDGMENT MIGRATES UPSTREAM</text>

  <!-- =================== Bottom: what's gained, what's lost =================== -->
  <g>
    <rect x="60" y="540" width="420" height="140" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#cardShadow)"/>
    <text x="84" y="568" font-size="11" font-weight="700" fill="#15803D" letter-spacing="1.4">GAINED</text>
    <text x="84" y="596" font-size="13" fill="#0F1729">Compounding leverage — one hour of spec</text>
    <text x="84" y="614" font-size="13" fill="#0F1729">produces hundreds of correct outputs.</text>
    <text x="84" y="640" font-size="13" fill="#0F1729">Diagnosable failures — Cat 1–7 names</text>
    <text x="84" y="658" font-size="13" fill="#0F1729">the artifact to amend, not just the output.</text>
  </g>

  <g>
    <rect x="500" y="540" width="420" height="140" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#cardShadow)"/>
    <text x="524" y="568" font-size="11" font-weight="700" fill="#9F1239" letter-spacing="1.4">HONESTLY LOST</text>
    <text x="524" y="596" font-size="13" fill="#0F1729">Flow state of complex debugging.</text>
    <text x="524" y="614" font-size="13" fill="#0F1729">Tacit knowledge as scarce leverage.</text>
    <text x="524" y="640" font-size="13" fill="#0F1729">The career ladder lags the shift —</text>
    <text x="524" y="658" font-size="13" fill="#0F1729">recognition for spec authorship is rare.</text>
  </g>

  <g>
    <rect x="940" y="540" width="420" height="140" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#cardShadow)"/>
    <text x="964" y="568" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="1.4">THE NEW VALUE-ADD</text>
    <text x="964" y="596" font-size="13" fill="#0F1729">The senior engineer's leverage moves</text>
    <text x="964" y="614" font-size="13" fill="#0F1729">from "who knew the code" to</text>
    <text x="964" y="640" font-size="13" fill="#0F1729">"who authored the spec the code is</text>
    <text x="964" y="658" font-size="13" fill="#0F1729">judged against."</text>
  </g>
</svg>
