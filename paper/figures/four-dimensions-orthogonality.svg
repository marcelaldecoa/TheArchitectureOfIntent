<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="dotShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="axisArrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F1729"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-size="22" font-weight="700"
        fill="#0F1729" letter-spacing="0.5">Agency × Autonomy: Two Independent Dimensions</text>
  <text x="550" y="68" text-anchor="middle" font-size="13" font-style="italic"
        fill="#64748B">Real systems sit in all four quadrants. Treating these as a single &quot;automation level&quot; collapses the design space onto a diagonal.</text>

  <!-- Plot bounds: x 140..980, y 110..560 -->

  <!-- Quadrant background tints -->
  <rect x="140" y="110" width="420" height="225" fill="#EEF2FF" opacity="0.5"/>  <!-- Q2: top-left -->
  <rect x="560" y="110" width="420" height="225" fill="#FEF3C7" opacity="0.4"/>  <!-- Q1: top-right -->
  <rect x="140" y="335" width="420" height="225" fill="#F0FDF4" opacity="0.5"/>  <!-- Q3: bottom-left -->
  <rect x="560" y="335" width="420" height="225" fill="#FCE7F3" opacity="0.45"/> <!-- Q4: bottom-right -->

  <!-- Mid grid lines (dashed) -->
  <line x1="140" y1="335" x2="980" y2="335" stroke="#94A3B8"
        stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="560" y1="110" x2="560" y2="560" stroke="#94A3B8"
        stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Axes (drawn on top) -->
  <line x1="140" y1="560" x2="990" y2="560" stroke="#0F1729"
        stroke-width="1.8" marker-end="url(#axisArrow)"/>
  <line x1="140" y1="560" x2="140" y2="100" stroke="#0F1729"
        stroke-width="1.8" marker-end="url(#axisArrow)"/>

  <!-- X-axis label -->
  <text x="990" y="595" text-anchor="end" font-size="14" font-weight="700"
        fill="#0F1729">Agency  →</text>
  <text x="990" y="613" text-anchor="end" font-size="11" fill="#64748B">
    judgment latitude · decisions made without consultation
  </text>

  <!-- Y-axis label (rotated) -->
  <text transform="translate(108, 335) rotate(-90)" text-anchor="middle"
        font-size="14" font-weight="700" fill="#0F1729">↑  Autonomy</text>
  <text transform="translate(126, 335) rotate(-90)" text-anchor="middle"
        font-size="11" fill="#64748B">operational independence · steps without per-step approval</text>

  <!-- Axis end labels -->
  <text x="140" y="582" text-anchor="middle" font-size="11" fill="#64748B">low</text>
  <text x="945" y="582" text-anchor="middle" font-size="11" fill="#64748B">high</text>
  <text x="125" y="565" text-anchor="end" font-size="11" fill="#64748B">low</text>
  <text x="125" y="115" text-anchor="end" font-size="11" fill="#64748B">high</text>

  <!-- Quadrant labels (top-right corner of each quadrant, no overlap with examples) -->
  <text x="555" y="135" text-anchor="end" font-size="13" font-weight="700"
        fill="#4338CA">Q2 · Wide autonomy, narrow agency</text>
  <text x="975" y="135" text-anchor="end" font-size="13" font-weight="700"
        fill="#92400E">Q1 · Wide autonomy, wide agency</text>
  <text x="555" y="555" text-anchor="end" font-size="13" font-weight="700"
        fill="#166534">Q3 · Narrow autonomy, narrow agency</text>
  <text x="975" y="555" text-anchor="end" font-size="13" font-weight="700"
        fill="#9F1239">Q4 · Narrow autonomy, wide agency</text>

  <!-- Example points & labels (carefully placed; labels in white pill tags, no overlap) -->

  <!-- Q1 (top-right) -->
  <circle cx="800" cy="180" r="6" fill="#92400E" filter="url(#dotShadow)"/>
  <line x1="800" y1="180" x2="800" y2="218" stroke="#92400E" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="655" y="218" width="290" height="26" rx="13" fill="#FFFFFF"
        stroke="#F59E0B" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="800" y="236" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Autonomous coding agent (Devin-class)</text>

  <circle cx="700" cy="280" r="6" fill="#92400E" filter="url(#dotShadow)"/>
  <line x1="700" y1="280" x2="780" y2="305" stroke="#92400E" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="645" y="305" width="270" height="26" rx="13" fill="#FFFFFF"
        stroke="#F59E0B" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="780" y="323" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Orchestrator-over-self deployment</text>

  <!-- Q2 (top-left) -->
  <circle cx="220" cy="170" r="6" fill="#4338CA" filter="url(#dotShadow)"/>
  <line x1="220" y1="170" x2="280" y2="200" stroke="#4338CA" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="155" y="200" width="310" height="26" rx="13" fill="#FFFFFF"
        stroke="#6366F1" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="310" y="218" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Cron-job ETL script (no judgment, no oversight)</text>

  <circle cx="320" cy="270" r="6" fill="#4338CA" filter="url(#dotShadow)"/>
  <line x1="320" y1="270" x2="320" y2="305" stroke="#4338CA" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="185" y="305" width="270" height="26" rx="13" fill="#FFFFFF"
        stroke="#6366F1" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="320" y="323" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Deterministic CI/CD pipeline</text>

  <!-- Q3 (bottom-left) -->
  <circle cx="240" cy="430" r="6" fill="#166534" filter="url(#dotShadow)"/>
  <line x1="240" y1="430" x2="290" y2="395" stroke="#166534" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="155" y="370" width="300" height="26" rx="13" fill="#FFFFFF"
        stroke="#10B981" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="305" y="388" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Code-review Advisor (suggests; never acts)</text>

  <circle cx="350" cy="500" r="6" fill="#166534" filter="url(#dotShadow)"/>
  <line x1="350" y1="500" x2="320" y2="465" stroke="#166534" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="183" y="438" width="270" height="26" rx="13" fill="#FFFFFF"
        stroke="#10B981" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="318" y="456" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Search agent that surfaces options</text>

  <!-- Q4 (bottom-right) -->
  <circle cx="800" cy="430" r="6" fill="#9F1239" filter="url(#dotShadow)"/>
  <line x1="800" y1="430" x2="800" y2="395" stroke="#9F1239" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="645" y="370" width="310" height="26" rx="13" fill="#FFFFFF"
        stroke="#E11D48" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="800" y="388" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Compliance Guardian with explicit gates</text>

  <circle cx="730" cy="500" r="6" fill="#9F1239" filter="url(#dotShadow)"/>
  <line x1="730" y1="500" x2="780" y2="465" stroke="#9F1239" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="630" y="438" width="320" height="26" rx="13" fill="#FFFFFF"
        stroke="#E11D48" stroke-width="1.2" filter="url(#dotShadow)"/>
  <text x="790" y="456" text-anchor="middle" font-size="12" font-weight="600"
        fill="#0F1729">Refund-approval agent (high-stakes, gated)</text>

  <!-- Caption -->
  <text x="550" y="660" text-anchor="middle" font-size="12" font-style="italic"
        fill="#64748B">Figure 2. Two of the four calibration dimensions plotted against each other. No quadrant is empty.</text>
  <text x="550" y="680" text-anchor="middle" font-size="12" font-style="italic"
        fill="#64748B">Treating Agency and Autonomy as a single &quot;automation level&quot; (e.g., SAE J3016) collapses this design space onto a diagonal.</text>
  <text x="550" y="700" text-anchor="middle" font-size="12" font-style="italic"
        fill="#64748B">The other two dimensions (Responsibility, Reversibility) are similarly orthogonal.</text>
</svg>
