name: Compile paper & decks

on:
  push:
    branches:
      - main
    paths:
      - "paper/architecture-of-intent.md"
      - "paper/architecture-of-intent-workshop.md"
      - "paper/references.bib"
      - "paper/figures/**.svg"
      - "paper/build_presentation.py"
      - "paper/build_html_presentation.py"
      - "paper/presentation_content.py"
      - ".github/workflows/build-paper.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "compile-paper"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc + LaTeX + rsvg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            lmodern \
            librsvg2-bin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: pip install --quiet python-pptx Pillow lxml

      - name: Verify deck/paper sync
        run: python3 paper/check-deck-sync.py

      - name: Regenerate figure PNGs from SVGs
        working-directory: paper
        run: |
          for svg in figures/*.svg; do
            png="${svg%.svg}.png"
            rsvg-convert --format=png --width=1800 "$svg" --output "$png"
            echo "rendered $png"
          done

      - name: Mirror cross-cutting figures into src/images/ for the book
        run: |
          mkdir -p src/images
          # The framework canvas is referenced from both the paper (figures/) and
          # the mdBook introduction (src/images/). Keep the book copy in lockstep
          # with the paper copy so the SVG remains the single source of truth.
          cp paper/figures/architecture-of-intent-canvas.png src/images/architecture-of-intent-canvas.png

      - name: Build PPTX deck
        working-directory: paper
        run: python3 build_presentation.py

      - name: Build HTML deck
        working-directory: paper
        run: python3 build_html_presentation.py

      - name: Compile long-form paper PDF
        working-directory: paper
        run: |
          pandoc architecture-of-intent.md \
            --citeproc \
            --bibliography references.bib \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            --output architecture-of-intent.pdf

      - name: Compile workshop-length paper PDF
        working-directory: paper
        run: |
          pandoc architecture-of-intent-workshop.md \
            --citeproc \
            --bibliography references.bib \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            --output architecture-of-intent-workshop.pdf

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: paper-artifacts
          path: |
            paper/architecture-of-intent.pdf
            paper/architecture-of-intent-workshop.pdf
            paper/architecture-of-intent.pptx
            paper/architecture-of-intent.html
            paper/figures/*.png
            src/images/architecture-of-intent-canvas.png
          retention-days: 90

      - name: Open or update PR with rebuilt artifacts
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/paper-artifacts
          base: main
          add-paths: |
            paper/architecture-of-intent.pdf
            paper/architecture-of-intent-workshop.pdf
            paper/architecture-of-intent.pptx
            paper/architecture-of-intent.html
            paper/figures/*.png
            src/images/architecture-of-intent-canvas.png
          commit-message: |
            Auto-rebuild paper artifacts

            Triggered by ${{ github.sha }}.
          title: "Auto-rebuild paper artifacts"
          body: |
            Rebuilt by the **Compile paper & decks** workflow after the source change in `${{ github.sha }}`.

            Includes the regenerated paper PDF, the PPTX deck, the HTML deck, and any updated figure PNGs.

            Loop-safety: the trigger filter on the workflow only watches source paths, so merging this PR will not retrigger the workflow.

            Close this PR if you don't want the rebuilt artifacts; the bot will reopen it on the next source change.
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          delete-branch: true
